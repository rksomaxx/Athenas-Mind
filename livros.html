<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/png" href="capas/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biblioteca Digital | Athena's Mind</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
    --gold:#C9A84C;
    --gold-light:#E8C96A;
    --dark:#0D0C0A;
    --dark2:#181610;
    --cream:#F0E9D6;
    --text:#C8BDA0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--dark);
    color:var(--cream);
    font-family:'Jost',sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

header{
    text-align:center;
    padding:60px 20px 30px;
}

header h1{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(2.5rem, 6vw, 4rem);
    font-weight:300;
}

header p{
    color:var(--text);
    margin-top:10px;
}

.search-area{
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
}

.search-area input,
.search-area select{
    padding:14px 18px;
    border:1px solid rgba(201,168,76,.2);
    border-radius:10px;
    min-width:250px;
    background:var(--dark2);
    color:var(--cream);
    font-family: 'Jost', sans-serif;
    outline: none;
    transition: border-color 0.3s;
}

.search-area input:focus,
.search-area select:focus {
    border-color: var(--gold);
}

.grid{
    max-width:1300px;
    width: 100%;
    margin:auto;
    padding:30px 20px 60px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:30px;
}

/* Envolvente de link para não quebrar o layout */
.card-item {
    display: flex;
    text-decoration: none;
    color: inherit;
}

.card{
    background:var(--dark2);
    border-radius:16px;
    overflow:hidden;
    border:1px solid rgba(201,168,76,.15);
    transition:.3s ease;
    width: 100%;

    display:flex;
    flex-direction:column;
}

.card:hover{
    transform:translateY(-6px);
    border-color: rgba(201,168,76,.4);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    height:380px;
    object-fit:cover;
}

.card-content{
    padding:25px;

    display:flex;
    flex-direction:column;
    flex:1;
}

.card h2{
    font-family:'Cormorant Garamond', serif;
    font-size: 1.8rem;
    margin-bottom:10px;
    font-variant-numeric: lining-nums;
    color: var(--cream);
}

.categoria{
    color:var(--gold);
    font-size:13px;
    margin-bottom:15px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.status-breve{
    display:inline-flex;
    align-items:center;
    justify-content:center;

    width:100%;
    height:50px;

    margin-top:auto;

    background:rgba(201,168,76,.08);
    border:1px solid rgba(201,168,76,.35);
    border-radius:12px;

    color:var(--gold);
    font-weight:600;
    letter-spacing:2px;
    text-transform:uppercase;
    font-size: 14px;

    cursor:default;
    user-select:none;
    transition: 0.3s;
}

/* Botão LER AGORA */
.status-breve.ativo {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    border: none;
    cursor: pointer;
}

.card-item:hover .status-breve.ativo {
    filter: brightness(1.1);
    box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
}

.voltar{
    text-align:center;
    margin: 20px 0 40px;
}

.voltar a{
    color:var(--gold);
    text-decoration:none;
    font-size: 15px;
    transition: opacity 0.3s;
}

.voltar a:hover {
    opacity: 0.8;
}

footer{
    margin-top:auto;
    padding:25px;
    text-align:center;
    color:#777;
    font-size:12px;
    border-top:1px solid rgba(201,168,76,.15);
}

</style>
</head>
<body>

<header>
    <h1>Biblioteca Digital</h1>
    <p>Explore seu acervo de livros e materiais de estudo</p>
</header>

<div class="search-area">

    <input
        type="text"
        id="busca"
        placeholder="Pesquisar por título..."
        onkeyup="filtrarLivros()"
    >

    <select id="categoria" onchange="filtrarLivros()">
        <option value="todos">Todas as Categorias</option>
        <option value="ficcao">Ficção</option>
        <option value="literatura">Literatura</option>
        <option value="historia">História</option>
    </select>

</div>

<div class="grid" id="gridLivros">

    <!-- Card 1: Disponível -->
    <a href="leitor/leitor.html?pdf=fragmentos.pdf" class="card-item" data-categoria="ficcao">
        <div class="card">
            <img src="capas/Fragmentos de Um Mesmo Homem.jpg" alt="Fragmentos de Um Mesmo Homem">
            <div class="card-content">
                <div class="categoria">Ficção</div>
                <h2>Fragmentos de Um Mesmo Homem</h2>
                
                <div class="status-breve ativo">
                    LER AGORA
                </div>
            </div>
        </div>
    </a>

    <!-- Card 2: Em Breve -->
    <div class="card-item" data-categoria="ficcao">
        <div class="card">
            <img src="capas/Luminary.jpg" alt="Luminary">
            <div class="card-content">
                <div class="categoria">Ficção</div>
                <h2>Luminary</h2>
                <div class="status-breve">
                    EM BREVE
                </div>
            </div>
        </div>
    </div>

</div>

<div class="voltar">
    <a href="index.html">← Voltar para a página inicial</a>
</div>

<script>
function filtrarLivros(){
    let busca = document.getElementById("busca").value.toLowerCase();
    let categoriaSelecionada = document.getElementById("categoria").value.toLowerCase();
    let itens = document.querySelectorAll(".card-item");

    itens.forEach(item => {
        let titulo = item.querySelector("h2").textContent.toLowerCase();
        let catItem = item.dataset.categoria.toLowerCase();

        let bateuBusca = titulo.includes(busca);
        let bateuCategoria = (categoriaSelecionada === "todos" || categoriaSelecionada === catItem);

        if (bateuBusca && bateuCategoria) {
            item.style.display = "flex"; // Mantém o elemento visível sem quebrar o layout
        } else {
            item.style.display = "none"; // Oculta o item completo
        }
    });
}
</script>

<footer>
    © 2026 Ricardo Soma · Desenvolvido no Visual Studio Code
</footer>

</body>
</html>
